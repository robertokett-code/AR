<html>
<head>
  <meta charset="utf-8">
  <title>AR Cube Test</title>

  <!-- Подключаем библиотеки -->
  <script src="assets/js/aframe.min.js"></script>
  <script src="assets/js/aframe-ar.js"></script>
  <script src="assets/js/aframe-extras.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- Маркер Hiro -->
    <a-marker preset="hiro"
              smooth="true"
              smoothCount="10"
              smoothTolerance="0.01"
              smoothThreshold="5">

  <!-- Орбита (если птичка летает вокруг маркера) -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">

    <!-- Птичка -->
    <a-entity 
        gltf-model="assets/models/model.glb"
        scale="0.5 0.5 0.5"
        position="1 0 0"
        animation-mixer="clip: metarig|Fly"
        shadow="cast: true">
    </a-entity>

  </a-entity>

</a-marker>

    <!-- Камера -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
