<html>
<head>
  <meta charset="utf-8">
  <title>AR Cube Test</title>

  <!-- Подключаем библиотеки -->
  <script src="assets/js/aframe.min.js"></script>
  <script src="assets/js/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- Маркер Hiro -->
    <a-marker preset="hiro">

  <!-- Орбита (если птичка летает вокруг маркера) -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">

    <!-- Птичка -->
    <a-entity 
        gltf-model="assets/models/model.glb"
        scale="0.5 0.5 0.5"
        position="1 0 0"
        animation-mixer="clip: metarig|Fly loop: repeat"
        shadow="cast: true">
    </a-entity>

  </a-entity>

  <!-- Плоскость для тени -->
  <a-plane 
      rotation="-90 0 0"
      width="4"
      height="4"
      color="#ffffff"
      opacity="0.0"
      shadow="receive: true">
  </a-plane>

</a-marker>

<!-- Свет -->
<a-entity light="type: directional; intensity: 1; castShadow: true" position="1 2 1"></a-entity>


    <!-- Камера -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
